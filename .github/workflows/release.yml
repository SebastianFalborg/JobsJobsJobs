name: Release Package

# This action will start when a correctly formatted tag is pushed (e.g. 0.1.0)

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Check formatting
        run: dotnet csharpier check .

      - name: Restore solution
        run: dotnet restore src/JobsJobsJobs.sln

      - name: Build solution
        run: dotnet build src/JobsJobsJobs.sln --configuration Release --no-restore

      - name: Test solution
        run: dotnet test src/JobsJobsJobs.sln --configuration Release --no-build --verbosity normal

      - name: Build & Pack
        run: dotnet pack src/JobsJobsJobs/JobsJobsJobs.csproj -c Release --no-build /p:Version=${{github.ref_name}}

      - name: Push to NuGet
        run: dotnet nuget push **/*.nupkg -k ${{secrets.NUGET_API_KEY}} -s https://api.nuget.org/v3/index.json
