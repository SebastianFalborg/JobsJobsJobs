name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Check formatting
        run: dotnet csharpier check .

      - name: Restore solution
        run: dotnet restore src/JobsJobsJobs.sln

      - name: Build solution
        run: dotnet build src/JobsJobsJobs.sln --configuration Release --no-restore

      - name: Test solution
        run: dotnet test src/JobsJobsJobs.sln --configuration Release --no-build --verbosity normal
